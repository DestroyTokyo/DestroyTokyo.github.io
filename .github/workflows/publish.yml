name: Publish Maven Repo

on:
  push:
    branches: [ "main" ]
    paths:
      - 'jars/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Maven repo
        run: python generate_data.py

      - name: Deploy to repo branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          mv maven-repo ../maven-repo-temp
          
          if git ls-remote --heads origin repo | grep -q repo; then
            git fetch origin repo
            git checkout -f repo
          else
            git checkout --orphan repo
          fi
          
          git rm -rf . 2>/dev/null || true
          
          cp -r ../maven-repo-temp/* .
          
          rm -rf ../maven-repo-temp
          
          git add .
          git commit -m "Deploy Maven repo $(date)"
          
          git push origin repo --force